---
- name: Add users and groups
  hosts: all
  gather_facts: false

  tasks:
    - name: Create groups
      become: true
      group:
        name: "{{ item }}"
        state: present
      loop: "{{ users | map(attribute='groups') | flatten | unique }}"

    - name: Add users to groups
      become: true
      user:
        name: "{{ item.name }}"
        groups: "{{ item.groups }}"
        append: yes
      loop: "{{ users }}"

    - name: Add ssh key from Github account
      become: true
      authorized_key:
        user: "{{ item.name }}"
        key: "https://github.com/{{ item.github }}.keys"
        manage_dir: yes
        state: present
        exclusive: false
      loop: "{{ users }}"
      failed_when: false

    - name: Set passwordless sudo
      become: true
      lineinfile:
        dest: /etc/sudoers
        line: "{{ item.name }} ALL=(ALL) NOPASSWD: ALL"
        state: present
        validate: visudo -cf %s
      loop: "{{ users }}"
      when: item.name is defined and item.passwordless_sudo is true

- name: Configure base system
  hosts: all
  gather_subset:
    - '!hardware'

  tasks:
    - name: Silence motd
      become: true
      file:
        path: /etc/update-motd.d/*
        mode: 0400
        recurse: yes

    - name: Get figlet hostname
      shell: figlet -f slant {{ ansible_facts['hostname'] }}
      register: figlet_hostname
      changed_when: false
      delegate_to: localhost

    - name: Set /etc/motd to a static message
      become: true
      copy:
        dest: /etc/motd
        content: |
          {{ figlet_hostname.stdout }}

    - name: Modify the /boot/cmdline.txt file to allow for cgroup stats
      become: true
      lineinfile:
        path: /boot/config.txt
        regexp: "rootwait$"
        line: '\1 cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1'
      when: "'raspberry_pis' in group_names"

- name: Install Hashicorp and Docker
  hosts: nomad
  gather_subset:
    - '!hardware'

  tasks:
    - name: Create apt keyrings directory
      become: true
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Ensure required packages are installed
      become: true
      apt:
        name: ["ca-certificates", "gnupg", "curl"]
        state: present
        update_cache: true

    # --- Hashicorp ---

    - name: Download Hashicorp GPG key
      become: true
      get_url:
        url: https://apt.releases.hashicorp.com/gpg
        dest: /tmp/hashicorp.gpg
        mode: "0644"

    - name: Dearmor Hashicorp GPG key
      become: true
      shell:
        cmd: gpg --batch --yes --dearmor -o /etc/apt/keyrings/hashicorp.gpg /tmp/hashicorp.gpg
        creates: /etc/apt/keyrings/hashicorp.gpg

    - name: Add Hashicorp apt repository
      become: true
      deb822_repository:
        name: hashicorp
        types: deb
        uris: https://apt.releases.hashicorp.com
        suites: "{{ ansible_distribution_release }}"
        components: main
        architectures: "{{ arch_map[ansible_architecture] | default('amd64') }}"
        signed_by: /etc/apt/keyrings/hashicorp.gpg
        state: present

    - name: Install Nomad and Consul
      become: true
      apt:
        name: ["nomad", "consul"]
        state: present
        update_cache: true

    # --- Docker ---

    - name: Download Docker GPG key
      become: true
      get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /tmp/docker.gpg
        mode: "0644"

    - name: Dearmor Docker GPG key
      become: true
      shell:
        cmd: gpg --batch --yes --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.gpg
        creates: /etc/apt/keyrings/docker.gpg

    - name: Set correct permissions on Docker GPG key
      become: true
      file:
        path: /etc/apt/keyrings/docker.gpg
        mode: "0644"

    - name: Add Docker apt repository
      become: true
      deb822_repository:
        name: docker
        types: deb
        uris: https://download.docker.com/linux/debian
        suites: "{{ ansible_distribution_release }}"
        components: stable
        architectures: "{{ arch_map[ansible_architecture] | default('amd64') }}"
        signed_by: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Install Docker packages
      become: true
      apt:
        name: ["docker-ce", "docker-ce-cli", "containerd.io", "docker-compose"]
        state: present
        update_cache: true
