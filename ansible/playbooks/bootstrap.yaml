---
- name: Add users and groups
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Create groups
      ansible.builtin.group:
        name: "{{ item }}"
        state: present
      loop: "{{ users | map(attribute='groups') | flatten | unique }}"

    - name: Add users to groups
      ansible.builtin.user:
        name: "{{ item.name }}"
        groups: "{{ item.groups }}"
        append: true
      loop: "{{ users }}"

    - name: Add ssh key from Github account
      ansible.posix.authorized_key:
        user: "{{ item.name }}"
        key: "https://github.com/{{ item.github }}.keys"
        manage_dir: true
        state: present
        exclusive: false
      loop: "{{ users }}"
      failed_when: false

    - name: Set passwordless sudo
      ansible.builtin.lineinfile:
        dest: /etc/sudoers
        line: "{{ item.name }} ALL=(ALL) NOPASSWD: ALL"
        state: present
        validate: visudo -cf %s
      loop: "{{ users }}"
      when: item.name is defined and item.passwordless_sudo is true

- name: Configure base system
  hosts: all
  become: true
  gather_subset:
    - '!hardware'

  tasks:
    - name: Silence motd
      ansible.builtin.file:
        path: /etc/update-motd.d/*
        mode: "0400"
        recurse: true

    - name: Get figlet hostname
      become: false
      ansible.builtin.command: figlet -f slant {{ ansible_facts['hostname'] }}
      register: figlet_hostname
      changed_when: false
      delegate_to: localhost

    - name: Set /etc/motd to a static message
      ansible.builtin.copy:
        dest: /etc/motd
        content: |
          {{ figlet_hostname.stdout }}
        mode: "0644"

    - name: Modify the /boot/cmdline.txt file to allow for cgroup stats
      ansible.builtin.lineinfile:
        path: /boot/config.txt
        regexp: "rootwait$"
        line: '\1 cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1'
      when: "'raspberry_pis' in group_names"

- name: Install Hashicorp and Docker
  hosts: nomad
  become: true
  gather_subset:
    - '!hardware'

  tasks:
    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Ensure required packages are installed
      ansible.builtin.apt:
        name: ["ca-certificates", "gnupg", "curl"]
        state: present
        update_cache: true

    - name: Set up Hashicorp apt repository
      ansible.builtin.include_tasks: tasks/add_apt_repository.yaml
      vars:
        apt_repo_name: hashicorp
        apt_repo_gpg_url: https://apt.releases.hashicorp.com/gpg
        apt_repo_uri: https://apt.releases.hashicorp.com
        apt_repo_architectures: "{{ arch_map[ansible_architecture] | default('amd64') }}"

    - name: Install Nomad and Consul
      ansible.builtin.apt:
        name: ["nomad", "consul"]
        state: present
        update_cache: true

    - name: Set up Docker apt repository
      ansible.builtin.include_tasks: tasks/add_apt_repository.yaml
      vars:
        apt_repo_name: docker
        apt_repo_gpg_url: https://download.docker.com/linux/debian/gpg
        apt_repo_uri: https://download.docker.com/linux/debian
        apt_repo_components: stable
        apt_repo_architectures: "{{ arch_map[ansible_architecture] | default('amd64') }}"

    - name: Install Docker packages
      ansible.builtin.apt:
        name: ["docker-ce", "docker-ce-cli", "containerd.io", "docker-compose"]
        state: present
        update_cache: true
