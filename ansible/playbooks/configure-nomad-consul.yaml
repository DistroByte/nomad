---
# Deploys Nomad and Consul config to all nodes, creates host volume
# directories, and ensures both services are running.
#
# Required vars (set in group_vars or pass with -e):
#   nomad_datacenter_name        - e.g. "dc1"
#   nomad_server_bootstrap_expect - e.g. 2
#   consul_encrypt_key            - gossip encryption key (use ansible-vault)
#
# Generate a new encrypt key with: consul keygen
- name: Configure Nomad and Consul
  hosts: nomad
  become: true
  gather_subset:
    - '!hardware'

  tasks:
    # --- Consul ---

    - name: Create Consul config directory
      ansible.builtin.file:
        path: /etc/consul.d
        state: directory
        owner: consul
        group: consul
        mode: "0750"

    - name: Deploy Consul base config
      ansible.builtin.template:
        src: templates/consul/consul.hcl.j2
        dest: /etc/consul.d/consul.hcl
        owner: consul
        group: consul
        mode: "0640"
      notify: Reload Consul

    - name: Deploy Consul server config
      ansible.builtin.template:
        src: templates/consul/consul-server.hcl.j2
        dest: /etc/consul.d/consul-server.hcl
        owner: consul
        group: consul
        mode: "0640"
      notify: Reload Consul

    - name: Deploy Consul systemd service
      ansible.builtin.copy:
        src: templates/consul/consul.service
        dest: /etc/systemd/system/consul.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart Consul

    - name: Enable and start Consul
      ansible.builtin.systemd:
        name: consul
        enabled: true
        state: started

    # --- Nomad ---

    - name: Create Nomad config directory
      ansible.builtin.file:
        path: /etc/nomad.d
        state: directory
        mode: "0750"

    - name: Deploy Nomad base config
      ansible.builtin.template:
        src: templates/nomad/nomad-base.hcl.j2
        dest: /etc/nomad.d/base.hcl
        mode: "0640"
      notify: Reload Nomad

    - name: Deploy Nomad client config
      ansible.builtin.template:
        src: templates/nomad/nomad-client.hcl.j2
        dest: /etc/nomad.d/client.hcl
        mode: "0640"
      notify: Restart Nomad

    - name: Deploy Nomad server config
      ansible.builtin.template:
        src: templates/nomad/nomad-server.hcl.j2
        dest: /etc/nomad.d/server.hcl
        mode: "0640"
      notify: Reload Nomad

    - name: Deploy Nomad systemd service
      ansible.builtin.copy:
        src: templates/nomad/nomad.service
        dest: /etc/systemd/system/nomad.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart Nomad

    - name: Enable and start Nomad
      ansible.builtin.systemd:
        name: nomad
        enabled: true
        state: started

    # --- Host volumes for Immich postgres ---

    - name: Create Nomad host volume directory for postgres primary
      ansible.builtin.file:
        path: /opt/nomad/volumes/immich-postgres
        state: directory
        owner: "{{ postgres_uid }}"
        group: "{{ postgres_gid }}"
        mode: "0750"
      when: inventory_hostname == 'hermes'

    - name: Create Nomad host volume directory for postgres replica
      ansible.builtin.file:
        path: /opt/nomad/volumes/immich-postgres-replica
        state: directory
        owner: "{{ postgres_uid }}"
        group: "{{ postgres_gid }}"
        mode: "0750"
      when: inventory_hostname == 'zeus'

    - name: Create Nomad host volume directory for photo MySQL
      ansible.builtin.file:
        path: /opt/nomad/volumes/photo-mysql
        state: directory
        owner: "{{ mysql_uid }}"
        group: "{{ mysql_gid }}"
        mode: "0750"
      when: inventory_hostname == 'hermes'

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Reload Consul
      ansible.builtin.systemd:
        name: consul
        state: reloaded

    - name: Restart Consul
      ansible.builtin.systemd:
        name: consul
        state: restarted

    - name: Reload Nomad
      ansible.builtin.systemd:
        name: nomad
        state: reloaded

    - name: Restart Nomad
      ansible.builtin.systemd:
        name: nomad
        state: restarted
