---
# Deploys Nomad and Consul config to all nodes, creates host volume
# directories, and ensures both services are running.
#
# Required vars (set in group_vars or pass with -e):
#   nomad_datacenter_name        - e.g. "dc1"
#   nomad_server_bootstrap_expect - e.g. 2
#   consul_encrypt_key            - gossip encryption key (use ansible-vault)
#
# Generate a new encrypt key with: consul keygen
- name: Configure Nomad and Consul
  hosts: nomad
  become: true
  gather_facts: false

  tasks:
    # --- Consul ---

    - name: Create Consul data directory
      ansible.builtin.file:
        path: /opt/consul
        state: directory
        owner: consul
        group: consul
        mode: "0750"

    - name: Create Consul config directory
      ansible.builtin.file:
        path: /etc/consul.d
        state: directory
        owner: consul
        group: consul
        mode: "0750"

    - name: Create Consul TLS directory
      ansible.builtin.file:
        path: /etc/consul.d/tls
        state: directory
        owner: consul
        group: consul
        mode: "0750"

    - name: Remove unrecognised files from Consul config directory
      ansible.builtin.find:
        paths: /etc/consul.d
        file_type: file
        excludes:
          - consul.hcl
          - consul-server.hcl
      register: consul_extra_files

    - name: Delete unrecognised Consul config files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ consul_extra_files.files }}"
      notify: Reload Consul

    # --- Consul TLS ---
    # CA is generated once on the first nomad node and distributed to all.
    # CA cert is valid for 10 years; server cert for 1 year — re-run to rotate.

    - name: Generate Consul CA on primary node
      ansible.builtin.command:
        cmd: consul tls ca create
        chdir: /etc/consul.d/tls
        creates: /etc/consul.d/tls/consul-agent-ca.pem
      run_once: true
      delegate_to: "{{ groups.nomad[0] }}"

    - name: Set ownership on Consul CA files
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: consul
        group: consul
        mode: "{{ item.mode }}"
      loop:
        - { path: /etc/consul.d/tls/consul-agent-ca.pem, mode: "0644" }
        - { path: /etc/consul.d/tls/consul-agent-ca-key.pem, mode: "0600" }
      run_once: true
      delegate_to: "{{ groups.nomad[0] }}"

    - name: Generate Consul server certificate on primary node
      ansible.builtin.command:
        cmd: consul tls cert create -server -dc {{ nomad_datacenter_name }}
        chdir: /etc/consul.d/tls
        creates: /etc/consul.d/tls/{{ nomad_datacenter_name }}-server-consul-0.pem
      run_once: true
      delegate_to: "{{ groups.nomad[0] }}"

    - name: Set ownership on Consul server cert files
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: consul
        group: consul
        mode: "{{ item.mode }}"
      loop:
        - { path: "/etc/consul.d/tls/{{ nomad_datacenter_name }}-server-consul-0.pem", mode: "0644" }
        - { path: "/etc/consul.d/tls/{{ nomad_datacenter_name }}-server-consul-0-key.pem", mode: "0600" }
      run_once: true
      delegate_to: "{{ groups.nomad[0] }}"

    - name: Fetch Consul TLS files from primary node
      ansible.builtin.fetch:
        src: "/etc/consul.d/tls/{{ item }}"
        dest: "/tmp/consul-tls/{{ item }}"
        flat: true
      loop:
        - consul-agent-ca.pem
        - "{{ nomad_datacenter_name }}-server-consul-0.pem"
        - "{{ nomad_datacenter_name }}-server-consul-0-key.pem"
      run_once: true
      delegate_to: "{{ groups.nomad[0] }}"
      no_log: true

    - name: Deploy Consul TLS files to all servers
      ansible.builtin.copy:
        src: "/tmp/consul-tls/{{ item.file }}"
        dest: "/etc/consul.d/tls/{{ item.file }}"
        owner: consul
        group: consul
        mode: "{{ item.mode }}"
      loop:
        - { file: consul-agent-ca.pem, mode: "0644" }
        - { file: "{{ nomad_datacenter_name }}-server-consul-0.pem", mode: "0644" }
        - { file: "{{ nomad_datacenter_name }}-server-consul-0-key.pem", mode: "0600" }
      no_log: true
      notify: Restart Consul

    - name: Deploy Consul base config
      ansible.builtin.template:
        src: templates/consul/consul.hcl.j2
        dest: /etc/consul.d/consul.hcl
        owner: consul
        group: consul
        mode: "0640"
      notify: Reload Consul

    - name: Deploy Consul server config
      ansible.builtin.template:
        src: templates/consul/consul-server.hcl.j2
        dest: /etc/consul.d/consul-server.hcl
        owner: consul
        group: consul
        mode: "0640"
      notify: Reload Consul

    - name: Deploy Consul systemd service
      ansible.builtin.copy:
        src: templates/consul/consul.service
        dest: /etc/systemd/system/consul.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart Consul

    - name: Enable and start Consul
      ansible.builtin.systemd:
        name: consul
        enabled: true
        state: started

    # --- Nomad ---

    - name: Create Nomad config directory
      ansible.builtin.file:
        path: /etc/nomad.d
        state: directory
        mode: "0750"

    - name: Remove unrecognised files from Nomad config directory
      ansible.builtin.find:
        paths: /etc/nomad.d
        file_type: file
        excludes:
          - base.hcl
          - client.hcl
          - server.hcl
      register: nomad_extra_files

    - name: Delete unrecognised Nomad config files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ nomad_extra_files.files }}"
      notify: Restart Nomad

    - name: Deploy Nomad base config
      ansible.builtin.template:
        src: templates/nomad/nomad-base.hcl.j2
        dest: /etc/nomad.d/base.hcl
        mode: "0640"
      notify: Reload Nomad

    - name: Deploy Nomad client config
      ansible.builtin.template:
        src: templates/nomad/nomad-client.hcl.j2
        dest: /etc/nomad.d/client.hcl
        mode: "0640"
      notify: Restart Nomad

    - name: Deploy Nomad server config
      ansible.builtin.template:
        src: templates/nomad/nomad-server.hcl.j2
        dest: /etc/nomad.d/server.hcl
        mode: "0640"
      notify: Reload Nomad

    - name: Deploy Nomad systemd service
      ansible.builtin.copy:
        src: templates/nomad/nomad.service
        dest: /etc/systemd/system/nomad.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart Nomad

    - name: Enable and start Nomad
      ansible.builtin.systemd:
        name: nomad
        enabled: true
        state: started

    # --- Host volumes ---

    - name: Create Nomad host volume directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "0750"
      loop: "{{ nomad_host_volumes }}"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Reload Consul
      ansible.builtin.systemd:
        name: consul
        state: reloaded

    - name: Restart Consul
      ansible.builtin.systemd:
        name: consul
        state: restarted

    - name: Reload Nomad
      ansible.builtin.systemd:
        name: nomad
        state: reloaded

    - name: Restart Nomad
      ansible.builtin.systemd:
        name: nomad
        state: restarted
