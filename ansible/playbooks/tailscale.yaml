---
# Installs Tailscale on all nomad nodes and connects them to headscale.
#
# Prerequisites:
#   1. headscale job is running at https://headscale.dbyte.xyz
#   2. A headscale user and reusable pre-auth key have been created:
#        nomad alloc exec -job headscale headscale users create distro
#        nomad alloc exec -job headscale headscale preauthkeys create \
#          --user 1 --reusable --expiration 90d
#   3. The key is stored in Ansible vault:
#        ansible-vault encrypt_string '<key>' --name vault_tailscale_authkey \
#          >> ansible/group_vars/all.yaml
#
# After running this playbook, approve the advertised subnet routes in headscale:
#   nomad alloc exec -job headscale headscale nodes list-routes --identifier <id>
#   nomad alloc exec -job headscale headscale nodes approve-routes --identifier <id> --routes 192.168.0.0/24,0.0.0.0/0,::/0
- name: Install and connect Tailscale
  hosts: tailscale
  become: true
  gather_subset:
    - '!hardware'

  tasks:
    - name: Download Tailscale GPG key
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/debian/bookworm.noarmor.gpg
        dest: /etc/apt/keyrings/tailscale.gpg
        mode: "0644"

    - name: Add Tailscale apt repository
      ansible.builtin.deb822_repository:
        name: tailscale
        types: deb
        uris: https://pkgs.tailscale.com/stable/debian
        suites: "{{ ansible_distribution_release }}"
        components: main
        signed_by: /etc/apt/keyrings/tailscale.gpg
        state: present

    - name: Install Tailscale
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: true

    - name: Enable IP forwarding for subnet routing
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: "1"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - net.ipv4.ip_forward
        - net.ipv6.conf.all.forwarding

    - name: Enable and start tailscaled
      ansible.builtin.systemd:
        name: tailscaled
        enabled: true
        state: started

    - name: Apply Tailscale configuration
      ansible.builtin.command: >
        tailscale up
        --login-server={{ tailscale_login_server }}
        --authkey={{ vault_tailscale_authkey }}
        {{ ('--advertise-routes=' + tailscale_advertise_routes) if tailscale_advertise_routes else '' }}
        {{ '--advertise-exit-node' if tailscale_exit_node else '' }}
        --accept-routes
        --hostname={{ inventory_hostname }}
        --reset
      changed_when: false
