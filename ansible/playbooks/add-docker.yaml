---
- name: Install Docker
  hosts: nomad

  vars:
    arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armhf

  tasks:
    - name: Ensure required packages are installed
      become: true
      apt:
        name: ["ca-certificates", "curl", "gnupg"]
        state: present
      when: ansible_os_family == "Debian"

    - name: Create apt keyrings directory
      become: true
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      become: true
      get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /tmp/docker.gpg
        mode: "0644"

    - name: Dearmor Docker GPG key
      become: true
      shell:
        cmd: gpg --batch --yes --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.gpg
        creates: /etc/apt/keyrings/docker.gpg

    - name: Set correct permissions on Docker GPG key
      become: true
      file:
        path: /etc/apt/keyrings/docker.gpg
        mode: "0644"

    - name: Add Docker apt repository
      become: true
      apt_repository:
        repo: "deb [arch={{ arch_map[ansible_architecture] | default('amd64') }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker
      when: ansible_os_family == "Debian"

    - name: Install Docker packages
      become: true
      apt:
        name: ["docker-ce", "docker-ce-cli", "containerd.io", "docker-compose"]
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"
