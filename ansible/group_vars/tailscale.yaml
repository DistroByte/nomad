---
tailscale_authkey: "{{ vault_tailscale_authkey }}"

# Per-host config — override in host_vars as needed
tailscale_login_server: https://headscale.dbyte.xyz
tailscale_advertise_routes: ""
tailscale_exit_node: false

# Composed into the artis3n.tailscale role's tailscale_args variable
tailscale_args: >-
  --login-server={{ tailscale_login_server }}
  --accept-routes
  --hostname={{ inventory_hostname }}
  {{ ('--advertise-routes=' + tailscale_advertise_routes) if tailscale_advertise_routes else '' }}
  {{ '--advertise-exit-node' if tailscale_exit_node else '' }}
  --reset
